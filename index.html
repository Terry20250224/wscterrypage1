<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gem 視覺工程師 - Terry's Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(to bottom, #f8f1e9, #f5e8d5);
      font-family: 'Noto Sans TC', system-ui, sans-serif;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgb(139 90 43 / 0.1);
    }
    .nav-btn {
      transition: all 0.3s ease;
    }
    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 15px -3px rgb(139 90 43 / 0.2);
    }
  </style>
</head>
<body class="min-h-screen pb-20">
  <header class="bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-2">
      <button onclick="goHome()" class="text-2xl" aria-label="回到頁面頂端">✕</button>
      <div>
        <p class="text-sm font-medium">Gem 視覺工程師 · Terry's Hub</p>
        <p class="text-xs text-gray-500">terry20250224.github.io</p>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 pt-8">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-14 h-14 bg-gradient-to-br from-purple-500 via-pink-500 to-rose-500 rounded-2xl flex items-center justify-center text-white text-3xl">🎨</div>
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Gem 視覺工程師</h1>
        <p class="text-gray-600">Midjourney / Flux / Grok Imagine 專業提示詞生成器</p>
      </div>
    </div>

    <section class="card p-6 mb-8">
      <p class="text-sm text-gray-600 mb-4">輸入任何描述，我會幫你轉化成高品質視覺提示詞</p>
      <textarea id="inputText" rows="5" class="w-full p-5 border border-gray-200 rounded-2xl focus:outline-none focus:border-purple-500 resize-y text-base" placeholder="例如：一個穿著漢服的女孩在雨中撐傘走在古巷..."></textarea>
      <button onclick="generatePrompt()" class="w-full mt-6 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-medium py-4 rounded-2xl text-lg transition-all">生成專業 Prompt</button>
    </section>

    <section class="card p-6">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-semibold text-gray-800">生成的 Prompt</h2>
        <button onclick="copyPrompt()" class="text-purple-600 hover:text-purple-700 flex items-center gap-1 text-sm"><i class="fas fa-copy"></i> 複製</button>
      </div>
      <textarea id="outputPrompt" rows="10" class="w-full p-5 border border-gray-200 rounded-2xl font-mono text-sm leading-relaxed" readonly></textarea>
    </section>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 py-4 px-4 max-w-2xl mx-auto" aria-label="頁面導航">
    <div class="grid grid-cols-3 gap-3">
      <div>
        <button onclick="navigate(0)" class="nav-btn w-full bg-white border-2 border-purple-700 text-purple-700 font-medium py-3 rounded-2xl flex items-center justify-center gap-2"><i class="fas fa-home"></i><span>回主頁</span></button>
        <input id="linkHome" type="url" placeholder="主頁連結" class="mt-2 w-full text-xs px-3 py-1.5 border border-gray-300 rounded-xl text-center">
      </div>
      <div>
        <button onclick="navigate(1)" class="nav-btn w-full bg-white border-2 border-purple-700 text-purple-700 font-medium py-3 rounded-2xl flex items-center justify-center gap-2"><i class="fas fa-chevron-left"></i><span>上一頁</span></button>
        <input id="linkPrev" type="url" placeholder="上一頁連結" class="mt-2 w-full text-xs px-3 py-1.5 border border-gray-300 rounded-xl text-center">
      </div>
      <div>
        <button onclick="navigate(2)" class="nav-btn w-full bg-white border-2 border-purple-700 text-purple-700 font-medium py-3 rounded-2xl flex items-center justify-center gap-2"><span>下一頁</span><i class="fas fa-chevron-right"></i></button>
        <input id="linkNext" type="url" placeholder="下一頁連結" class="mt-2 w-full text-xs px-3 py-1.5 border border-gray-300 rounded-xl text-center">
      </div>
    </div>
  </nav>

  <script>
    function generatePrompt() {
      const input = document.getElementById('inputText').value.trim();
      if (!input) {
        alert('請輸入描述內容！');
        return;
      }

      const prompt = `${input}, cinematic lighting, volumetric light, ultra detailed, 8k, masterpiece, best quality, intricate details, sharp focus, photorealistic, rule of thirds, professional composition`;
      document.getElementById('outputPrompt').value = prompt;
    }

    async function copyPrompt() {
      const output = document.getElementById('outputPrompt');
      if (!output.value) {
        alert('請先生成 Prompt');
        return;
      }
      try {
        await navigator.clipboard.writeText(output.value);
      } catch {
        output.select();
        document.execCommand('copy');
      }
      alert('✅ Prompt 已複製到剪貼簿！');
    }

    function navigate(type) {
      const ids = ['linkHome', 'linkPrev', 'linkNext'];
      const link = document.getElementById(ids[type]).value.trim();
      if (link) {
        window.open(link, '_blank', 'noopener,noreferrer');
      } else {
        alert('請先填寫對應的連結！');
      }
    }

    function goHome() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
