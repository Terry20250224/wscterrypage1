<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerryHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #f8f9fa; font-family: 'Noto Sans TC', system-ui, sans-serif; }
    .hub-card { transition: all 0.3s ease; }
    .hub-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="pb-12">
  <div class="max-w-2xl mx-auto px-4 py-6">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">TerryHub</h1>
      <button onclick="addNewCard()" class="bg-blue-600 text-white px-5 py-2 rounded-xl flex items-center gap-2 hover:bg-blue-700">
        <i class="fas fa-plus"></i> 新增按鍵
      </button>
    </div>
    <div id="cardsContainer" class="space-y-6"></div>
  </div>

  <script>
    let cardCount = 0;

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, character => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        "'": '&#39;',
        '"': '&quot;'
      }[character]));
    }

    function createCard(title = '新功能', url = '') {
      cardCount++;
      const id = cardCount;
      const container = document.getElementById('cardsContainer');
      const cardHTML = `
        <div class="hub-card bg-white rounded-2xl overflow-hidden shadow">
          <div class="bg-blue-600 text-white p-4 text-center font-medium text-lg" contenteditable="true" id="title-${id}">${escapeHtml(title)}</div>
          <div class="p-5 space-y-4">
            <div>
              <input type="text" id="name-${id}" value="${escapeHtml(title)}" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500" placeholder="顯示名稱">
            </div>
            <div>
              <input type="text" id="url-${id}" value="${escapeHtml(url)}" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500" placeholder="https://example.com">
            </div>
            <div class="flex gap-3">
              <button onclick="saveCard(${id})" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl font-medium">儲存設定</button>
              <button onclick="openLink(${id})" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-medium">前往</button>
            </div>
          </div>
        </div>`;
      container.insertAdjacentHTML('beforeend', cardHTML);
    }

    function saveCard(id) {
      const name = document.getElementById(`name-${id}`).value.trim();
      document.getElementById(`title-${id}`).textContent = name || '未命名';
      alert('✅ 設定已儲存！');
    }

    function openLink(id) {
      const url = document.getElementById(`url-${id}`).value.trim();
      if (url) {
        window.open(url, '_blank', 'noopener,noreferrer');
      } else {
        alert('請先填寫網址！');
      }
    }

    function addNewCard() {
      createCard(`新功能 ${cardCount + 1}`, '');
    }

    window.addEventListener('DOMContentLoaded', () => {
      createCard('Google Vids', 'https://vids.google.com');
      createCard('Temp Mail', 'https://temp-mail.org');
      createCard('Design Tools', 'https://webstack.cc');
      createCard('Gem 視覺工程師', 'index.html');
      createCard('投資分析器', '#');
      createCard('YouTube', 'https://youtube.com');
      createCard('GitHub', 'https://github.com');
      createCard('Notion', 'https://notion.so');
      createCard('ChatGPT', 'https://chatgpt.com');
    });
  </script>
</body>
</html>
